group 'com.kittenml.kittentts_flutter'
version '0.1.0'

buildscript {
    repositories {
        google()
        mavenCentral()
    }
}

rootProject.allprojects {
    repositories {
        google()
        mavenCentral()
    }
}

apply plugin: 'com.android.library'

android {
    if (project.android.hasProperty("namespace")) {
        namespace 'com.kittenml.kittentts_flutter'
    }

    compileSdk 35
    ndkVersion flutter.ndkVersion

    defaultConfig {
        minSdk 21
    }

    externalNativeBuild {
        cmake {
            path "../src/CMakeLists.txt"
        }
    }
}
